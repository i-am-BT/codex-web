name: PR checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Require latest main unless trusted author
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          TRUSTED_BEHIND_AUTHORS: i-kirito
        run: |
          if [[ ",${TRUSTED_BEHIND_AUTHORS}," == *",${PR_AUTHOR},"* ]]; then
            echo "Trusted author ${PR_AUTHOR}: latest-main requirement skipped; all validation steps remain required."
            exit 0
          fi
          git fetch --no-tags origin "$BASE_REF:refs/remotes/origin/$BASE_REF"
          if ! git merge-base --is-ancestor "origin/$BASE_REF" "$HEAD_SHA"; then
            echo "::error::PR 分支落后于 $BASE_REF，请先 rebase 到最新主分支。"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Check patch whitespace
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git diff --check "origin/$BASE_REF...$HEAD_SHA"
